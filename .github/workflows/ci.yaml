# Adapted from https://github.com/domdomegg/typescript-library-template/blob/master/.github/workflows/ci.yaml
# (which is itself synced from domdomegg/domdomegg file-sync/node-general.yaml).
# Differences: branch is `main`, and we install native build deps for headless-gl/canvas
# before npm ci. No tsc build step — mindcraft is plain ESM.

name: CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        node-version: [lts/*, current]
    env:
      CI: true
    steps:
      - name: Checkout ${{ github.sha }}
        uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org/
      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxi-dev libxinerama-dev libxrandr-dev \
            libgl1-mesa-dev libgles2-mesa-dev libosmesa6-dev \
            libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Build
        run: npm run build --if-present
      - name: Test
        run: npm run test --if-present

  deploy:
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    env:
      CI: true
    steps:
      - name: Checkout ${{ github.sha }}
        uses: actions/checkout@v6
      - name: Use Node.js with the npmjs.org registry
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org/
      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxi-dev libxinerama-dev libxrandr-dev \
            libgl1-mesa-dev libgles2-mesa-dev libosmesa6-dev \
            libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build --if-present
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/457105351064/locations/global/workloadIdentityPools/github-secrets-pool/providers/github-secrets-github'
      - uses: google-github-actions/setup-gcloud@v3
      - name: Get NPM token
        id: npm-token
        run: |
          token=$(gcloud secrets versions access latest --secret=npm-token --project=gcp-github-secrets)
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
      - name: Publish ${{ github.ref }}
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ steps.npm-token.outputs.token }}
